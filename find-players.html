<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Players — FindUrDuo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    .matchmaking-page {
      padding-top: 120px;
      padding-bottom: 80px;
      min-height: 100vh;
    }

    .filters-bar {
      background: #0f131a;
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 24px;
      border-radius: 4px;
      margin-bottom: 40px;
      display: flex;
      gap: 20px;
      align-items: flex-end;
      position: relative;
      z-index: 100;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .filter-group label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7280;
    }

    /* Sharp, sleek inputs */
    .filter-select {
      background: #161b22;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      color: white;
      padding: 0 16px;
      border-radius: 4px !important;
      font-size: 14px;
      font-weight: 600;
      height: 48px;
      cursor: pointer;
      outline: none;
      transition: all 0.2s;
      width: 100%;
    }

    .filter-select:hover, .filter-select:focus {
      border-color: #ff4655 !important;
      background: #1a2029;
    }

    .players-grid, .players-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 2;
    }

    /* Page title */
    .page-header {
      margin-bottom: 40px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 24px;
    }

    .page-header h1 {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 8px;
      color: white;
      text-transform: uppercase;
    }

    .page-header p {
      color: #9ca3af;
      font-size: 16px;
      font-weight: 500;
    }

    #loading-state {
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      padding: 60px;
    }

    /* Custom multi select */
    #rank-select-dropdown {
      background: #161b22 !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      border-radius: 4px !important;
      margin-top: 4px;
      z-index: 9999 !important;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8) !important;
    }

    .custom-option {
      position: relative;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #9ca3af;
      font-size: 14px;
      font-weight: 700;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
      overflow: hidden;
    }
    .custom-option:last-child {
      border-bottom: none;
    }
    .custom-option:hover {
      background: rgba(255, 255, 255, 0.03);
      color: white;
    }
    .custom-option.selected {
      background: rgba(255, 70, 85, 0.05);
      border-left: 3px solid #ff4655;
      color: white;
    }
    .custom-option input[type="checkbox"] {
      display: none;
    }
    .rank-option-bg {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      height: 36px;
      opacity: 0.2;
      pointer-events: none;
      transition: all 0.2s;
      filter: grayscale(1);
    }
    .custom-option.selected .rank-option-bg {
      opacity: 1;
      filter: grayscale(0);
      transform: translateY(-50%) scale(1.1);
    }
    .rank-option-text {
      position: relative;
      z-index: 1;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Custom Scrollbar for Dropdown */
    #rank-select-dropdown::-webkit-scrollbar {
      width: 4px;
    }
    #rank-select-dropdown::-webkit-scrollbar-track {
      background: transparent;
    }
    #rank-select-dropdown::-webkit-scrollbar-thumb {
      background: #374151;
      border-radius: 4px;
    }
    #rank-select-dropdown::-webkit-scrollbar-thumb:hover {
      background: #4b5563;
    }

    /* Player rows redesign */
    .player-row {
      background: #0f131a;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .player-row:hover {
      background: #161b22;
      border-color: #ff4655;
      transform: translateX(4px);
    }

    .status-dot-large {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.6);
      flex-shrink: 0;
    }

    .player-row-avatar {
      width: 56px;
      height: 56px;
      border-radius: 4px;
      background: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
      overflow: hidden;
      font-size: 20px;
    }

    .player-row-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .player-row-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .player-row-name-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .player-row-name {
      font-size: 20px;
      font-weight: 800;
      color: white;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }

    .rank-badge-list {
      background: rgba(255, 255, 255, 0.05);
      color: white;
      padding: 4px 10px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stats-group {
      display: flex;
      gap: 16px;
      color: #6b7280;
      font-size: 13px;
      font-weight: 600;
    }

    .stats-group span b {
      color: white;
    }

    .player-row-agents {
      display: flex;
      gap: 8px;
      margin-right: 24px;
    }

    .agent-tag-list {
      background: #161b22;
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: #9ca3af;
      padding: 6px 14px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .invite-btn {
      background: #ff4655;
      border: 1px solid #ff4655;
      color: white;
      padding: 12px 32px;
      border-radius: 2px;
      font-weight: 800;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .invite-btn:hover {
      background: white;
      color: black;
      border-color: white;
    }

    .rank-bg-icon {
      position: absolute;
      right: 180px;
      top: 50%;
      transform: translateY(-50%);
      height: 120px;
      opacity: 0.03;
      pointer-events: none;
      filter: grayscale(1);
    }
  </style>
</head>
<body>

    </div>

  <main class="matchmaking-page container">
    <header class="page-header">
      <div style="display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
          <h1 id="page-title">Jogadores Disponíveis</h1>
          <p id="page-desc">Match with players who share your rank and playstyle.</p>
        </div>
        <div style="color: var(--text-tertiary); font-size: 13px; font-weight: 600;">
          <span id="player-count-online">5</span> online
        </div>
      </div>
    </header>

    <section class="filters-bar">
      
      <div class="filter-group">
        <label>Game</label>
        <select id="filter-game" class="filter-select">
          <option value="valorant">Valorant</option>
          <option value="rocket-league">Rocket League</option>
          <option value="apex">Apex Legends</option>
          <option value="fortnite">Fortnite</option>
          <option value="cs2">CS2</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Rank</label>
        <div class="custom-multi-select" id="rank-multi-select" style="position: relative;">
          <div class="filter-select" id="rank-select-trigger" style="display: flex; justify-content: space-between; align-items: center;">
            <span id="rank-select-label" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">All Ranks</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:16px;height:16px;flex-shrink:0;opacity:0.7;"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div id="rank-select-dropdown" style="position: absolute; top: 100%; left: 0; right: 0; display: none; max-height: 280px; overflow-y: auto;">
            <!-- Options populated by JS -->
          </div>
        </div>
      </div>
      
      <button id="apply-filters" class="invite-btn" style="height: 48px; min-width: 140px;">Search</button>

    </section>

    <div id="players-list" class="players-list">
      <div id="loading-state">
        <div class="spinner"></div>
      </div>
      <!-- Player rows will be injected here -->
    </div>
  </main>
