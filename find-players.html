<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Players — FindUrDuo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/webp" href="Fotos/valorant.webp">
  <style>
    .matchmaking-page {
      padding-top: 120px;
      padding-bottom: 80px;
      min-height: 100vh;
    }

    .filters-bar {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: var(--radius-lg);
      margin-bottom: 40px;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: flex-end;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-group label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-tertiary);
    }

    .filter-select {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      min-width: 180px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .filter-select:focus {
      border-color: var(--accent);
    }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 0;
      color: var(--text-secondary);
    }

    .no-results h3 {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    /* Page title */
    .page-header {
      margin-bottom: 40px;
    }

    .page-header h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .page-header p {
      color: var(--text-secondary);
      font-size: 18px;
    }

    #loading-state {
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      padding: 60px;
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar scrolled">
    <div class="navbar-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">D</div>
        FindUrDuo
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li class="nav-dropdown">
          <a href="#" class="nav-dropdown-trigger">Games</a>
          <div class="nav-dropdown-menu">
            <a href="games/valorant.html">Valorant</a>
            <a href="games/rocket-league.html">Rocket League</a>
            <a href="games/apex-legends.html">Apex Legends</a>
            <a href="games/fortnite.html">Fortnite</a>
            <a href="games/cs2.html">CS2</a>
          </div>
        </li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="btn-ghost" id="nav-login">Log In</a>
        <a href="login.html?mode=signup" class="btn-primary" id="nav-signup">Sign Up</a>
        <div id="user-menu" style="display: none; align-items: center; gap: 16px;">
          <a href="profile.html" id="user-name" style="font-size: 14px; font-weight: 600; color: var(--accent-soft); transition: opacity 0.2s;"></a>
          <button class="btn-ghost" id="nav-logout" style="padding: 4px 8px;">Log Out</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="matchmaking-page container">
    <header class="page-header">
      <div style="display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
          <h1 id="page-title">Jogadores Disponíveis</h1>
          <p id="page-desc">Match with players who share your rank and playstyle.</p>
        </div>
        <div style="color: var(--text-tertiary); font-size: 13px; font-weight: 600;">
          <span id="player-count-online">5</span> online
        </div>
      </div>
    </header>

    <section class="filters-bar" style="background: transparent; border: none; padding: 0; margin-bottom: 32px;">
      <div class="quick-filters" style="display: flex; gap: 12px;">
        <button class="btn-filter active" data-range="all">TODOS</button>
        <button class="btn-filter" data-range="iron-bronze">IRON-BRONZE</button>
        <button class="btn-filter" data-range="gold-plat">GOLD-PLAT</button>
        <button class="btn-filter" data-range="diamond-plus">DIAMOND+</button>
      </div>
      
      <div style="margin-left: auto; display: flex; gap: 12px;">
        <div class="filter-group">
          <select id="filter-game" class="filter-select" style="background: #0f1722; border-radius: 8px;">
            <option value="valorant">Valorant</option>
            <option value="rocket-league">Rocket League</option>
            <option value="apex">Apex Legends</option>
            <option value="fortnite">Fortnite</option>
            <option value="cs2">CS2</option>
          </select>
        </div>
        <div class="filter-group">
          <select id="filter-rank" class="filter-select" style="background: #0f1722; border-radius: 8px;">
            <option value="all">All Ranks</option>
          </select>
        </div>
        <button id="apply-filters" class="btn-primary">Search</button>
      </div>
    </section>

    <div id="players-list" class="players-list">
      <div id="loading-state">
        <div class="spinner"></div>
      </div>
      <!-- Player rows will be injected here -->
    </div>
  </main>

  <style>
    .btn-filter {
      background: #111822;
      border: 1px solid #1f2937;
      color: #6b7280;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-filter:hover {
      border-color: #374151;
      color: #9ca3af;
    }

    .btn-filter.active {
      background: rgba(255, 70, 85, 0.05);
      border-color: #ff4655;
      color: #ff4655;
    }

    .players-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .player-row {
      background: #0d1117;
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .player-row:hover {
      background: #12181f;
      border-color: rgba(255, 70, 85, 0.15);
      transform: translateX(4px);
    }

    .status-dot-large {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
      flex-shrink: 0;
    }

    .player-row-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
      overflow: hidden;
      font-size: 18px;
    }

    .player-row-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .player-row-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .player-row-name-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .player-row-name {
      font-size: 17px;
      font-weight: 700;
      color: white;
    }

    .rank-badge-list {
      background: rgba(88, 101, 242, 0.1);
      color: #7289da;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stats-group {
      display: flex;
      gap: 16px;
      color: #4b5563;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
    }

    .stats-group span b {
      color: #9ca3af;
    }

    .player-row-agents {
      display: flex;
      gap: 8px;
      margin-right: 24px;
    }

    .agent-tag-list {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.03);
      color: #4b5563;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }

    .invite-btn {
      background: transparent;
      border: 1px solid #1f2937;
      color: white;
      padding: 10px 32px;
      border-radius: 8px;
      font-weight: 800;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .invite-btn:hover {
      background: white;
      color: black;
      border-color: white;
    }

    .rank-bg-icon {
      position: absolute;
      right: 120px;
      top: 50%;
      transform: translateY(-50%);
      height: 80%;
      opacity: 0.04;
      pointer-events: none;
      filter: grayscale(1);
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/find-players.js"></script>
</body>
</html>
