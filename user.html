<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile — FindUrDuo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/webp" href="Fotos/valorant.webp">
  <style>
    .profile-page {
      padding-top: 100px;
      padding-bottom: 80px;
      min-height: 100vh;
    }

    .profile-header-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 32px;
      position: relative;
      overflow: hidden;
    }

    .profile-header-card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 300px;
      height: 100%;
      background: radial-gradient(circle at top right, var(--accent-glow), transparent 70%);
      pointer-events: none;
    }

    .profile-avatar-large {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 800;
      color: white;
      border: 4px solid var(--bg-raised);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }

    .profile-info h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .profile-info p {
      color: var(--text-secondary);
      font-size: 15px;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 32px;
    }

    .profile-section {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      margin-bottom: 24px;
    }

    .profile-section h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .profile-section h2 svg {
      width: 20px;
      height: 20px;
      color: var(--accent-soft);
    }

    .bio-text {
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .game-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-deep);
      padding: 12px 20px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .game-badge img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .game-badge span {
      font-weight: 600;
      font-size: 14px;
    }

    .rank-display {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-deep);
      padding: 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      margin-top: 16px;
      position: relative;
      z-index: 1;
    }

    .rank-display img {
      width: 48px;
      height: 48px;
    }

    .profile-section {
      position: relative;
      overflow: hidden;
    }

    .profile-rank-bg {
      position: absolute;
      right: -20px;
      bottom: -20px;
      width: 120px;
      height: 120px;
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
      filter: grayscale(1);
    }

    .rank-info .rank-name {
      display: block;
      font-weight: 700;
      font-size: 16px;
      color: var(--text-primary);
    }

    .rank-info .rank-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .agents-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .agent-tag {
      padding: 6px 14px;
      background: var(--bg-raised);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-deep);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .social-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: #5865F2; /* Discord color */
      color: white;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 14px;
      width: 100%;
      justify-content: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar scrolled">
    <div class="navbar-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        FindUrDuo
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#games">Games</a></li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="btn-primary">Join Now</a>
      </div>
    </div>
  </nav>

  <main class="profile-page container">
    <div class="profile-header-card" id="profile-header">
      <div class="profile-avatar-large" id="user-avatar">?</div>
      <div class="profile-info">
        <h1 id="user-username">Loading...</h1>
        <p id="user-status">Finding their perfect duo</p>
      </div>
    </div>

    <div class="profile-grid">
      <!-- Left Column -->
      <div class="profile-sidebar">
        <div class="profile-section">
          <h2>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            About
          </h2>
          <div id="user-bio" class="bio-text">No bio provided.</div>
        </div>

        <div class="profile-section" id="social-section" style="display: none;">
          <h2>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            Contact
          </h2>
          <div id="discord-tag" class="social-btn">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
            <span id="discord-name">Discord User</span>
          </div>
        </div>
      </div>

      <!-- Right Column -->
      <div class="profile-main">
        <div class="profile-section">
          <h2>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
            Games Played
          </h2>
          <div id="games-list">
            <!-- Game badges will go here -->
          </div>
        </div>

        <div class="profile-section" id="valorant-section" style="display: none;">
          <h2 style="color: #ff4655">
            <img src="Fotos/valorant.webp" style="width:20px; height:20px; object-fit:contain;" alt="">
            Valorant Career
          </h2>
          <img id="val-rank-bg" class="profile-rank-bg" src="" alt="">
          <div class="rank-display">
            <img id="val-rank-icon" src="" alt="">
            <div class="rank-info">
              <span class="rank-label">Current Rank</span>
              <span class="rank-name" id="val-rank-name">Gold 3</span>
            </div>
          </div>
          <div style="margin-top: 24px;">
            <span style="font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">Favorite Agents</span>
            <div class="agents-list" id="val-agents">
              <!-- Agents tags will go here -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/user.js"></script>
</body>
</html>
